 # Traefik 与 后端 TCP 服务（MySQL/Redis/SSH 等）之间的连接行为、超时、TLS、保活、代理协议 的可复用配置模板

[tcp.serversTransports.mysql-tcp-timeout]
# Traefik 主动建立 TCP 连接到后端的最大等待时间
dialTimeout = "5s"

 # 长连接30s探活 
 # 对已建立的空闲连接，每隔多久发一次 TCP Keep-Alive 包
 # 及时发现死连接 / 半开连接
dialKeepAlive = "15s"   

# 一端关闭写（FIN）后，等多久再强制关闭读，彻底断开连接
terminationDelay = "200ms"

# 开启Proxy Protocol，后端能拿到真实IP
# v2 二进制协议
[tcp.serversTransports.my-tcp-timeout.proxyProtocol]
version = 2